apiVersion: v1
kind: Secret
metadata:
  name: core-watch-secret
type: Opaque
stringData:
  postgres-password: postgres
  aes-key: core-watch-student-demo-key
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: core-watch-config
data:
  postgres-connection: Host=postgres;Port=5432;Database=corewatch;Username=postgres;Password=postgres
  notification-url: http://notification:5002/api/notifications/alarm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: corewatch
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: core-watch-secret
                  key: postgres-password
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      containers:
        - name: notification
          image: core-watch-notification:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5002
          env:
            - name: ASPNETCORE_URLS
              value: http://0.0.0.0:5002
---
apiVersion: v1
kind: Service
metadata:
  name: notification
spec:
  selector:
    app: notification
  ports:
    - port: 5002
      targetPort: 5002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      containers:
        - name: ingestion
          image: core-watch-ingestion:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
          env:
            - name: ASPNETCORE_URLS
              value: http://0.0.0.0:5001
            - name: ConnectionStrings__CoreWatch
              valueFrom:
                configMapKeyRef:
                  name: core-watch-config
                  key: postgres-connection
            - name: NotificationService__Url
              valueFrom:
                configMapKeyRef:
                  name: core-watch-config
                  key: notification-url
            - name: Security__AesKey
              valueFrom:
                secretKeyRef:
                  name: core-watch-secret
                  key: aes-key
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion
spec:
  selector:
    app: ingestion
  ports:
    - port: 5001
      targetPort: 5001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consensus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consensus
  template:
    metadata:
      labels:
        app: consensus
    spec:
      containers:
        - name: consensus
          image: core-watch-consensus:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ConnectionStrings__CoreWatch
              valueFrom:
                configMapKeyRef:
                  name: core-watch-config
                  key: postgres-connection
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingress
  template:
    metadata:
      labels:
        app: ingress
    spec:
      containers:
        - name: ingress
          image: core-watch-ingress:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: ASPNETCORE_URLS
              value: http://0.0.0.0:5000
            - name: Services__Ingestion
              value: http://ingestion:5001
            - name: Services__Notification
              value: http://notification:5002
---
apiVersion: v1
kind: Service
metadata:
  name: ingress
spec:
  type: NodePort
  selector:
    app: ingress
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30080
